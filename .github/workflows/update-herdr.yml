name: Update herdr Version

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ./scripts/update-version.sh --check; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            CURRENT_VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)
            LATEST_TAG=$(curl -sf "https://api.github.com/repos/ogulcancelik/herdr/releases/latest" \
              | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -1)
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "latest=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and hashes
        if: steps.check.outputs.update_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-version.sh

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update herdr to ${{ steps.check.outputs.latest }}"
          title: "chore: update herdr to ${{ steps.check.outputs.latest }}"
          body: |
            ## Automated herdr Update

            Bumps herdr from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.

            ### Changes
            - Updated `version` in `package.nix`
            - Updated `sha256` per-platform hashes
            - Updated `flake.lock`

            ### Verify locally
            ```bash
            nix build
            ./result/bin/herdr --version
            ```

            Auto-generated by `.github/workflows/update-herdr.yml`.
          branch: update-herdr-${{ steps.check.outputs.latest }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable Auto-Merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch

      - name: Summary
        if: always()
        run: |
          {
            echo "## Update Summary"
            echo ""
            if [ "${{ steps.check.outputs.update_needed }}" = "true" ]; then
              echo "- **Current Version:** ${{ steps.check.outputs.current }}"
              echo "- **Latest Version:** ${{ steps.check.outputs.latest }}"
              echo ""
              echo "PR opened."
            else
              CURRENT_VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)
              echo "- **Current Version:** $CURRENT_VERSION"
              echo ""
              echo "Already up to date."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
