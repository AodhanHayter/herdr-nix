name: Build and Cache

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  workflow_run:
    workflows: ["Update herdr Version"]
    types: [completed]
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      HAS_CACHIX_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        if: env.HAS_CACHIX_TOKEN == 'true' && github.ref == 'refs/heads/master'
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'herdr-nix' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build herdr
        run: nix build .#herdr -o result --print-build-logs

      - name: Push to Cachix
        if: env.HAS_CACHIX_TOKEN == 'true' && github.ref == 'refs/heads/master'
        run: |
          nix build .#herdr --json | jq -r '.[].outputs.out' | cachix push "${{ vars.CACHIX_CACHE_NAME || 'herdr-nix' }}"

      - name: Test herdr
        run: ./result/bin/herdr --version
